# ┌─┐┌─┐┌┐┌┬ ┬┌─┐┬─┐┬┌─┌─┐
# ┌─┘├┤ │││││││ │├┬┘├┴┐└─┐
# └─┘└─┘┘└┘└┴┘└─┘┴└─┴ ┴└─┘
# https://github.com/kbuckleys/

$font = 0xProto Nerd Font
$monitor = DP-1

general {
    hide_cursor = true
}

animations {
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 2, linear
    animation = fadeOut, 1, 2, linear
    animation = inputFieldDots, 1, 1, linear
}

background {
    color = rgba(0,0,0,1)
    size = 100%, 100%
}

input-field {
    check_color = rgba(223,223,221,1)
    font_color = rgba(223,223,221,1)
    fail_color = rgba(223,223,221,1)
    inner_color = rgba(0,0,0,0)
    font_family = $font
    monitor = $monitor
    size = 20%, 10%
    outline_thickness = 0
    swap_font_color = true
    fade_on_empty = false
    placeholder_text = 
    dots_text_format = 󰇙
    check_text = 
    fail_text = 
    dots_size = 0.2
    dots_spacing = 0.4
}

label {
    color = rgba(223,223,221,1)
    monitor = $monitor
    text = $TIME
    font_size = 16
    font_family = $font
    position = 0, 47
    valign = bottom
}

label {
    color = rgba(160,160,155,1)
    text = cmd[update:60000] date +"%A, %d %B %Y"
    monitor = $monitor
    font_size = 12
    font_family = $font
    position = 0, 25
    valign = bottom
    halign = center
}
