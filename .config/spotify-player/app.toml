# ┌─┐┌─┐┌┐┌┬ ┬┌─┐┬─┐┬┌─┌─┐
# ┌─┘├┤ │││││││ │├┬┘├┴┐└─┐
# └─┘└─┘┘└┘└┴┘└─┘┴└─┴ ┴└─┘
# https://github.com/kbuckleys/

theme = "kripton"

playback_metadata_fields = [
  "repeat",
  "shuffle",
  "volume",
]
playback_format = """
{status}  {track}  󰇙  {artists} {liked}
{metadata}"""

playback_refresh_duration_in_ms = 0
enable_mouse_scroll_volume = false
sort_artist_albums_by_type = false
enable_audio_visualization = false
default_device = "spotify-player"
progress_bar_position = "Right"
app_refresh_duration_in_ms = 32
enable_cover_image_cache = true
progress_bar_type = "Line"
notify_streaming_only = false
enable_media_control = true
enable_streaming = "Always"
tracks_playback_limit = 50
notify_timeout_in_secs = 0
notify_transient = false
seek_duration_secs = 10
page_size_in_rows = 10
border_type = "Hidden"
cover_img_scale = 0.0
enable_notify = true
cover_img_length = 0
cover_img_width = 0
explicit_icon = "󰯹"
liked_icon = " "
pause_icon = ""
play_icon = ""
genre_num = 0

[notify_format]
summary = "{track}"
body = "{artists}"

[layout]
playback_window_position = "Top"
library.playlist_percent = 40
library.album_percent = 40
playback_window_height = 4

[device]
name = "spotify-player"
device_type = "speaker"
normalization = true
audio_cache = true
autoplay = true
bitrate = 320
volume = 100
