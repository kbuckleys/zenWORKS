[[themes]]
name = "kripton"

[themes.palette]
magenta = "#c8a4e0"
yellow = "#e0d8a4"
green = "#b6e0a4"
white = "#dfdfdd"
black = "#000000"
cyan = "#9bbfbf"
blue = "#6a707f"
red = "#e78284"

[themes.component_style]
playback_progress_bar_unfilled = { fg = "#20242a" , bg = "Black" }
playback_progress_bar = { fg = "Green", bg = "Black" }

lyrics_playing = { fg = "Green", modifiers = ["Bold"] }
lyrics_played = { fg = "Blue"}

page_desc = { fg = "Cyan", modifiers = ["Bold"] }
playback_album = { fg = "#fab387" }
playback_metadata = { fg = "Blue" }
playback_artists = { fg = "Green" }
playback_status = { fg = "Green" }
playback_track = { fg = "Green" }
playlist_desc = { fg = "Blue" }
table_header = { fg = "Blue" }
block_title = { fg = "Blue" }
border = { fg = "#20242a" }
