[[mgr.prepend_keymap]]
on = [ "<C-Tab>" ]
run = "tab_switch 1 --relative"
desc = "Next tab"

[[mgr.prepend_keymap]]
on = [ "<C-BackTab>" ]
run = "tab_switch -1 --relative"
desc = "Previous tab"

[[mgr.prepend_keymap]]
on = [ "g", "<Space>" ]
run = "cd --interactive"
desc = "Go to..."

[[mgr.prepend_keymap]]
on = [ "g", "D" ]
run = "cd ~/Documents"
desc = "Go to Documents"

[[mgr.prepend_keymap]]
on = [ "g", "d" ]
run = "cd ~/Downloads"
desc = "Go to Downloads"

[[mgr.prepend_keymap]]
on = [ "g", "c" ]
run = "cd ~/.config"
desc = "Go to .config"

[[mgr.prepend_keymap]]
on = [ "g", "p" ]
run = "cd ~/Pictures"
desc = "Go to Pictures"

[[mgr.prepend_keymap]]
on = [ "g", "v" ]
run = "cd ~/Videos"
desc = "Go to Videos"

[[mgr.prepend_keymap]]
on = [ "g", "/" ]
run = "cd /"
desc = "Go to Root"

[[mgr.prepend_keymap]]
on = [ "g", "m" ]
run = "cd /run/media"
desc = "Go to mounted media"

[[mgr.prepend_keymap]]
on = "M"
run = "plugin mount"

[[mgr.prepend_keymap]]
on = [ "c", "m" ]
run = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on = [ "c", "a", "a" ]
run = "plugin compress"
desc = "Archive"

[[mgr.prepend_keymap]]
on = [ "c", "a", "p" ]
run = "plugin compress -p"
desc = "Archive (Password)"

[[mgr.prepend_keymap]]
on = [ "c", "a", "h" ]
run = "plugin compress -ph"
desc = "Archive (Password Header)"

[[mgr.prepend_keymap]]
on = [ "c", "a", "l" ]
run = "plugin compress -l"
desc = "Archive (Compression Level)"

[[mgr.prepend_keymap]]
on = [ "c", "a", "u" ]
run = "plugin compress -phl"
desc = "Archive (Password + Header + Level)"

[[mgr.prepend_keymap]]
on = [ "g", "t" ]
run = "cd ~/.local/share/Trash"
desc = "Go to Trash"

# whoosh.yazi
[[mgr.prepend_keymap]]
on = [ "b", "a" ]
run = "plugin whoosh save"
desc = "Bookmark (hovered)"

[[mgr.prepend_keymap]]
on = [ "b", "A" ]
run = "plugin whoosh save_cwd"
desc = "Bookmark (current directory)"

[[mgr.prepend_keymap]]
on = [ "b", "t" ]
run = "plugin whoosh save_temp"
desc = "Temporary bookmark (hovered)"

[[mgr.prepend_keymap]]
on = [ "b", "T" ]
run = "plugin whoosh save_cwd_temp"
desc = "Temporary bookmark (current directory)"

[[mgr.prepend_keymap]]
on = [ "b", "f" ]
run = "plugin whoosh jump_by_fzf"
desc = "Jump bookmark by fzf"

[[mgr.prepend_keymap]]
on = [ "b", "d" ]
run = "plugin whoosh delete_by_key"
desc = "Delete bookmark by key"

[[mgr.prepend_keymap]]
on = [ "b", "D" ]
run = "plugin whoosh delete_by_fzf"
desc = "Delete bookmarks by fzf"

[[mgr.prepend_keymap]]
on = [ "b", "P" ]
run = "plugin whoosh delete_all"
desc = "Purge all user bookmarks"

[[mgr.prepend_keymap]]
on = [ "b", "r" ]
run = "plugin whoosh rename_by_key"
desc = "Rename bookmark by key"

[[mgr.prepend_keymap]]
on = [ "b", "R" ]
run = "plugin whoosh rename_by_fzf"
desc = "Rename bookmark by fzf"
