[spot]
border = { fg = "#9bbfbf" }
title = { fg = "#9bbfbf", bold = true }
tbl_col = { fg = "#9bbfbf" }
tbl_cell = { fg = "#9bbfbf", bg = "#20242a" }

[notify]
title_info = { fg = "#b6e0a4" }
title_warn = { fg = "#e0d8a4" }
title_error = { fg = "#e78284" }
icon_info = "п‘ү "
icon_warn = "о©¬ "
icon_error = "оӘҮ "

[pick]
border = { fg = "#9bbfbf" }
active = { fg = "#c8a4e0", bold = true }
inactive = {}

[input]
border = { fg = "#fab387" }
title = { bold = true }
value = { fg = "#fab387" }
selected = { reversed = true }

[cmp]
border = { fg = "#fab387" }
active = { fg = "#000000", bg = "#fab387" }
inactive = { fg = "#fab387" }

[tasks]
border = { fg = "#fab387" }
