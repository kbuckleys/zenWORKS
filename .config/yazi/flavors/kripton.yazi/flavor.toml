inactive = { bg = "#000000", fg = "#9bbfbf" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { bg = "#9bbfbf", fg = "#000000", bold = true }
normal_alt = { fg = "#9bbfbf", bg = "#20242a" }
select_main = { bg = "#c8a4e0", fg = "#000000", bold = true }
select_alt = { fg = "#c8a4e0", bg = "#20242a" }
unset_main = { bg = "#e0d8a4", fg = "#000000", bold = true }
unset_alt = { fg = "#e0d8a4", bg = "#20242a" }

[indicator]
preview = { underline = false }
padding = { open = "в–Ҳ", close = "в–Ҳ" }

[status]
overall = { fg = "#9bbfbf" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
perm_sep = { fg = "#20242a" }
perm_type = { fg = "#b6e0a4" }
perm_read = { fg = "#e0d8a4" }
perm_write = { fg = "#e78284" }
perm_exec = { fg = "#9bbfbf" }

# Progress
progress_normal = { fg = "#fab387", bg = "#20242a" }
progress_error = { fg = "#e78284", bg = "#20242a" }

[which]
cols = 3
mask = { bg = "#20242a" }
cand = { fg = "#fab387" }
rest = { fg = "#20242a" }
desc = { fg = "#dfdfdd" }
separator = " оӘң "
separator_style = { fg = "#6a707f" }

[confirm]
