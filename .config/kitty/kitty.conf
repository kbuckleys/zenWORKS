# ┌─┐┌─┐┌┐┌┬ ┬┌─┐┬─┐┬┌─┌─┐
# ┌─┘├┤ │││││││ │├┬┘├┴┐└─┐
# └─┘└─┘┘└┘└┴┘└─┘┴└─┴ ┴└─┘
# https://github.com/kbuckleys/

allow_remote_control socket-only
listen_on unix:@kitty-socket
auto_reload_config 0.1

# Font
font_family 0xProto Nerd Font
font_size 12.0

# Cursor
cursor_shape beam
cursor_beam_thickness 2.5
cursor_blink_interval 0.8
cursor_trail 30
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

enabled_layouts grid,*

# Mouse
mouse_hide_wait 3.0
confirm_os_window_close 0

window_border_width 1px
active_border_color #6a7179
inactive_border_color #20242a

# Selection
selection_foreground #000000
selection_background #eebebe

visual_bell_duration 0.1
visual_bell_color #e78284

# Colors
background #000000
foreground #dfdfdd

# Normal
color0  #000000
color1  #e78284
color2  #b6e0a4
color3  #fab387
color4  #9fcbfc
color5  #c8a4e0
color6  #9bbfbf
color7  #dfdfdd

# Bright
color8  #6a707f
color9  #eebebe
color10 #b6e0a4
color11 #e0d8a4
color12 #9fcbfc
color13 #c8a4e0
color14 #9bbfbf
color15 #dfdfdd

# Keybinds
map ctrl+tab
map ctrl+shift+tab
map ctrl+= change_font_size window +1.0
map ctrl+- change_font_size window -1.0
map ctrl+0 change_font_size window 0

map ctrl+shift+up move_window up
map ctrl+shift+down move_window down
map ctrl+shift+left move_window left
map ctrl+shift+right move_window right
